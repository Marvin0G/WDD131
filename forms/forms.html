<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Plan: SCD Heritage & Hope</title>
    <link rel="stylesheet" href="styles/forms.css">
</head>
<body>
<header>
        <h1>Product Review Form</h1>
</header>
    <main>
        <form method="get" action="review.html">
            
            <div class="form-group">
                <label for="product-name">Product Name <span class="required">*</span></label>
                <select id="product-name" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Overall Rating <span class="required">*</span></label>
                <div class="rating-container">
                    <label class="radio-label"><input type="radio" name="rating" value="1" required> 1 ☆</label>
                    <label class="radio-label"><input type="radio" name="rating" value="2" required> 2 ☆</label>
                    <label class="radio-label"><input type="radio" name="rating" value="3" required> 3 ☆</label>
                    <label class="radio-label"><input type="radio" name="rating" value="4" required> 4 ☆</label>
                    <label class="radio-label"><input type="radio" name="rating" value="5" required> 5 ☆</label>
                </div>
            </div>

            <div class="form-group">
                <label for="install-date">Date of Installation <span class="required">*</span></label>
                <input type="date" id="install-date" name="installDate" required>
            </div>

            <div class="form-group">
                <label>Useful Features (Check all that apply)</label>
                <div class="checkbox-container">
                    <label><input type="checkbox" name="features" value="durability"> Durability</label>
                    <label><input type="checkbox" name="features" value="ease-of-use"> Ease of Use</label>
                    <label><input type="checkbox" name="features" value="performance"> Performance</label>
                    <label><input type="checkbox" name="features" value="design"> Design</label>
                </div>
            </div>

            <div class="form-group">
                <label for="written-review">Written Review (Optional)</label>
                <textarea id="written-review" name="writtenReview" rows="4" placeholder="Share your experience with this product..."></textarea>
            </div>

            <div class="form-group">
                <label for="user-name">Your Name (Optional)</label>
                <input type="text" id="user-name" name="userName" placeholder="e.g., Jane Doe">
            </div>

            <input type="submit" value="Post Review" class="submit-btn">

        </form>
    </main>

    <footer>
         <p>©️<span class="currentyear"></span> 😊 Uwagbai Edeoba Marvin 😊 Nigeria </p>
        <p id="lastmodified"></p>
</footer>  

</body>
</html>
<script src="script/forms.js"></script>
